<!DOCTYPE html>
<html>
<head>
    <title>API Documentation - FindThePlace</title>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://fonts.googleapis.com/css?family=Montserrat:300,400,700|Roboto:300,400,700" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
        }
    </style>
    <script>
        // Добавляем обработчик для проверки загрузки
        window.onload = function() {
            fetch('/static/openapi-schema.yml')
                .then(response => {
                    if (!response.ok) {
                        console.error('Failed to load spec:', response.status);
                    }
                    return response.text();
                })
                .then(text => {
                    console.log('Spec loaded, length:', text.length);
                })
                .catch(error => {
                    console.error('Error loading spec:', error);
                });
        };
    </script>
</head>
<body>
    <redoc spec-url='./openapi-schema.yml'></redoc>
    <script src="https://cdn.jsdelivr.net/npm/redoc@next/bundles/redoc.standalone.js"></script>
</body>
</html>
